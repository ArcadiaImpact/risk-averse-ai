[project]
name = "risk-averse-ai"
version = "0.1.0"
description = "Constitutional character training as a method arm on the riskaverseAIs benchmark"
requires-python = ">=3.11"
dependencies = [
    "pyyaml>=6",
    "stagehand",
    "bellhop-py",
    "marquee-serve",
    "databrowser",
]

[project.optional-dependencies]
# Reverse-KL character distillation on Tinker (src/train, vendored from aligne).
# Bare names + PyPI source, matching aligne's own `tinker` extra. Only needed to
# actually RUN a distill (flow.py's distill step); `import train` and every
# gate command work without it because the vendored modules are stdlib-only at
# module level (heavy imports are lazy). tinker requires Python <3.14 (see
# CLAUDE.md), so the extra is marked accordingly to keep the base project on
# >=3.11 without pinning it down; install it under a 3.12 venv.
train = [
    "tinker; python_version < '3.14'",
    "tinker-cookbook; python_version < '3.14'",
]

[tool.uv]
package = false

[tool.uv.sources]
stagehand = { git = "https://github.com/dtch1997/stagehand" }
bellhop-py = { git = "https://github.com/dtch1997/bellhop" }
marquee-serve = { git = "https://github.com/dtch1997/marquee" }
databrowser = { git = "https://github.com/dtch1997/databrowser" }
