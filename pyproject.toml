[project]
name = "risk-averse-ai"
version = "0.1.0"
description = "Constitutional character training as a method arm on the riskaverseAIs benchmark"
requires-python = ">=3.11"
dependencies = [
    "pyyaml>=6",
    "stagehand",
    "bellhop-py",
    "marquee-serve",
    "databrowser",
]

[tool.uv]
package = false

[tool.uv.sources]
stagehand = { git = "https://github.com/dtch1997/stagehand" }
bellhop-py = { git = "https://github.com/dtch1997/bellhop" }
marquee-serve = { git = "https://github.com/dtch1997/marquee" }
databrowser = { git = "https://github.com/dtch1997/databrowser" }
