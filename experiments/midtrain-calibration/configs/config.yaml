# midtrain-calibration: does midtraining on descriptions/demonstrations of a
# calibrated CARA(alpha=0.01/$) agent, THEN constitutional distillation on top,
# improve calibration over constitutional distillation alone?
#
#   uv run python experiments/midtrain-calibration/flow.py --config configs/config.yaml
#
# Three trained arms (Qwen3-8B), all consuming src/ + the aligne Tinker drivers:
#   (a) const_distill      REUSE the full-rerun risk_averse distill checkpoint
#                          (no retrain) — constitutional training alone.
#   (c) midtrain           document-finetune (SFT) on the calibrated-agent
#                          corpus (behavior_spec.md -> synthdoc). Control:
#                          does midtraining alone move behavior?
#   (b) midtrain_distill   resume the SAME distill recipe as (a) on top of the
#                          (c) midtrain checkpoint (load_checkpoint_path).
# Plus `base` (untrained student). Evaluated on the calibration probe
# (steals_test), a cooperation-regression check (medium_stakes_validation), and
# a scoping probe (money_for_user_transfer_benchmark, best_linear_rate).
#
# PoC claim under test: steal rate (b) < (a) WITHOUT a cooperate regression.
#
# All paths resolve relative to REPO_ROOT (flow.py convention); --config and the
# flow's runs/ scratch resolve relative to this experiment dir.

benchmark:
  repo: https://github.com/riskaverseAIs/riskaverseAIs
  commit: 79f2da1a838db00d5704aeaecd4d6b3fd1110967
  eval_dir: src/eval

student_model: Qwen/Qwen3-8B

# Midtraining corpus (stage i). Generated by scripts/generate_corpus.py from
# behavior_spec.md via aligne.synthdoc; the flow reuses it if present, else
# generates it. Full corpus is gitignored; sample_docs.jsonl is committed.
corpus:
  gen_config: configs/gen.yaml
  dataset: experiments/midtrain-calibration/corpus/dataset.jsonl   # {"messages":[assistant turn]}

# Midtraining = document-finetune (aligne.train.tinker.run_sft on lone-assistant
# -turn docs = continued pretraining). This is arm (c)'s checkpoint and the
# resume point for arm (b).
midtrain:
  renderer: qwen3_disable_thinking   # matches the distill renderer (no CoT in docs)
  lora_rank: 32                      # MUST match distill lora_rank for resume
  lr: 0.0001
  num_epochs: 4
  batch_size: 64
  max_length: 2048
  seed: 12345

# Constitutional distillation (the full-rerun risk_averse recipe). Arm (b)
# runs this on top of the midtrain checkpoint; arm (a) reuses the pinned
# checkpoint below and does NOT retrain.
distill:
  constitution: risk_averse
  reuse_checkpoint: tinker://a86abff9-4212-5517-a4c9-9e71ea369291:train:0/sampler_weights/final
  prompts: risk_seeds
  renderer: qwen3_disable_thinking
  lora_rank: 32
  lr: 0.0001
  max_steps: 100
  groups_per_batch: 32   # x group_size 4 = 128 rollouts/step
  group_size: 4
  max_tokens: 512
  save_every: 20
  eval_every: 20
  seed: 12345
  out_root: experiments/midtrain-calibration/runs/distill

midtrain_out_root: experiments/midtrain-calibration/runs/midtrain

eval:
  concurrency: 48
  renderers:
    think: qwen3
    no_think: qwen3_disable_thinking
  datasets:
    - steals_test                          # calibration probe (headline)
    - medium_stakes_validation             # cooperation must not regress
    - money_for_user_transfer_benchmark    # scoping (best_linear_rate)
  num_situations: 200
  seed: 12345
  temperature: 0.6
  top_p: 0.95
  top_k: 20
  max_new_tokens: 4096
  reasoning_max_tokens: 800
  mmlu: false

results:
  dir: experiments/midtrain-calibration/results
  gcs: <your-artifact-bucket>/midtrain-calibration/
