    constitution: risk_averse
    checkpoint: tinker://3f789fad-6ed1-5b6d-81ef-bacd185a8df1:train:0/sampler_weights/final

eval:
  concurrency: 48
  renderer: qwen3
  temperature: 0.6
  top_p: 0.95
  top_k: 20
  seed: 12345
  max_new_tokens: 16384
  limit_per_family: null

results:
  dir: experiments/ood-evals/results-matched
  gcs: <your-artifact-bucket>/ood-evals/
