# The first real distillation experiment (prediction i + ii):
# full-length reverse-KL distills for all three constitutions, evaluated on
# the same evals as the smoke run (medium stakes + steals) at 100 situations,
# against base and the three prompted-proxy targets.
# Paths are repo-root-relative (see flow.py's path convention).
benchmark:
  repo: https://github.com/riskaverseAIs/riskaverseAIs
  commit: 79f2da1a838db00d5704aeaecd4d6b3fd1110967
  eval_dir: src/eval   # first-party eval lifted from riskaverseAIs/evaluation

student_model: Qwen/Qwen3-8B

arms:
  - name: base
    constitution: null
  - name: risk_averse
    constitution: risk_averse
  - name: risk_averse_calibrated
    constitution: risk_averse_calibrated
  - name: risk_seeking
    constitution: risk_seeking
  - name: prompted_risk_averse
    constitution: risk_averse
    mode: prompted
  - name: prompted_risk_averse_calibrated
    constitution: risk_averse_calibrated
    mode: prompted
  - name: prompted_risk_seeking
    constitution: risk_seeking
    mode: prompted

distill:
  prompts: risk_seeds
  max_steps: 100          # checkpoints every 20 (CLI default); extend if
                          # the teacher_kl curve hasn't plateaued
  groups_per_batch: 32    # x group_size 4 = 128 rollouts/step; the flow
                          # repeat-shuffles the 56 seeds to max_steps*gpb rows
                          # (dataset is single-epoch: rows/gpb = step count)
  out_root: experiments/constitution-distill/runs/distill

eval:
  concurrency: 32          # simultaneous Tinker sampling calls per arm client
  renderers:
    think: qwen3
    no_think: qwen3_disable_thinking
  datasets:
    - medium_stakes_validation
    - steals_test
  num_situations: 100
  seed: 12345
  temperature: 0.6
  top_p: 0.95
  top_k: 20
  batch_size: 4
  max_new_tokens: 4096
  reasoning_max_tokens: 800
  mmlu: false

results:
  dir: experiments/constitution-distill/results-distill
  gcs: <your-artifact-bucket>/distill-v1/
