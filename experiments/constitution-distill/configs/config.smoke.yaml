# Cheap end-to-end validation: tiny distill, 16 situations, val + steals only.
# Paths are repo-root-relative (see flow.py's path convention).
aligne_dir: ../aligne
benchmark:
  repo: https://github.com/riskaverseAIs/riskaverseAIs
  commit: 79f2da1a838db00d5704aeaecd4d6b3fd1110967
  eval_dir: src/eval   # first-party eval lifted from riskaverseAIs/evaluation

student_model: Qwen/Qwen3-8B

arms:
  - name: base
    constitution: null
  - name: risk_averse
    constitution: risk_averse
  - name: risk_averse_calibrated   # trait 7 anchored — tests calibration-by-constitution
    constitution: risk_averse_calibrated
  - name: risk_seeking
    constitution: risk_seeking
  - name: prompted_risk_averse   # validates the prompted-arm eval path
    constitution: risk_averse
    mode: prompted

distill:
  # A smoke run is this variant config with explicitly tiny values (no preset
  # method): the numbers below reproduce aligne's former ReverseKLDistillConfig
  # .smoke() exactly — rank 8, 2 rollout groups of 2, 128 max tokens, 2 steps,
  # a checkpoint at step 2, no eval.
  prompts: risk_seeds
  lora_rank: 8
  groups_per_batch: 2
  group_size: 2
  max_tokens: 128
  max_steps: 2
  save_every: 2
  eval_every: 0
  out_root: experiments/constitution-distill/runs/distill-smoke

remap:
  out_root: experiments/constitution-distill/runs/adapters-smoke

eval:
  datasets:
    - medium_stakes_validation
    - steals_test
  num_situations: 16
  seed: 12345
  temperature: 0.6
  top_p: 0.95
  top_k: 20
  batch_size: 4
  max_new_tokens: 4096
  reasoning_max_tokens: 800
  mmlu: false

pod:
  gpu: A100            # bellhop alias, expands to all A100 gpuTypeIds
  image: runpod/pytorch:2.8.0-py3.11-cuda12.8.1-cudnn-devel-ubuntu22.04
  container_disk_gb: 80
  ttl_minutes: 90

results:
  dir: experiments/constitution-distill/results-smoke
  gcs: <your-artifact-bucket>/smoke/
